<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Catálogo Lumora - Iluminación y decoración para tu hogar">
  <title>Catálogo - Lumora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <section class="page-hero">
    <div class="container">
      <h1 class="page-hero__title">Nuestro Catálogo</h1>
      <p class="page-hero__subtitle">Descubre la pieza perfecta para iluminar tu hogar</p>
    </div>
  </section>

  <main>
    <section class="section">
      <div class="container">
        <div class="catalog__controls">
          <div class="catalog__filters" id="filter-buttons"></div>
          <div class="catalog__search">
            <span class="catalog__search-icon">🔍</span>
            <input type="text" id="search-input" placeholder="Buscar productos..." aria-label="Buscar productos">
          </div>
        </div>
        <div class="product-grid" id="product-grid"></div>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>
  <script src="../js/data.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/catalog.js"></script>
</body>
</html>
